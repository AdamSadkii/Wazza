<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wazza Dashboard</title>
<style>
  :root {
    --bg: #0d0b1e;
    --card: #17142e;
    --border: #2c2750;
    --text: #e8e6f7;
    --muted: #8b86b3;
    --accent: #a78bfa;
    --green: #4ade80;
    --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1a1440 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 1.6rem; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); margin-bottom: 24px; font-size: 0.9rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1100px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
  }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: var(--accent); }
  .status-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: 8px; background: var(--red);
  }
  .status-dot.online { background: var(--green); }
  .imu-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.9rem; }
  .imu-row .val { font-family: Consolas, monospace; color: var(--text); }
  .imu-row .label { color: var(--muted); }
  button {
    background: #241e4a;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 4px 6px 4px 0;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover { background: #322a63; transform: translateY(-1px); }
  input[type="color"] {
    width: 44px; height: 38px; border: none; border-radius: 8px;
    background: none; cursor: pointer; vertical-align: middle;
  }
  #log {
    font-family: Consolas, monospace;
    font-size: 0.8rem;
    max-height: 260px;
    overflow-y: auto;
    line-height: 1.6;
  }
  #log .gesture { color: var(--accent); }
  #log .button { color: var(--green); }
  #log .time { color: var(--muted); margin-right: 8px; }
</style>
</head>
<body>
  <h1>Wazza <span>Dashboard</span></h1>
  <p class="sub"><span id="wandDot" class="status-dot"></span><span id="wandStatus">wand offline</span> · <span id="wsStatus">connecting…</span></p>

  <div class="grid">
    <div class="card">
      <h2>Live IMU</h2>
      <div class="imu-row"><span class="label">Accel X / Y / Z (m/s²)</span><span class="val" id="accel">—</span></div>
      <div class="imu-row"><span class="label">Gyro X / Y / Z (rad/s)</span><span class="val" id="gyro">—</span></div>
      <div class="imu-row"><span class="label">Last gesture</span><span class="val" id="lastGesture">—</span></div>
      <div class="imu-row"><span class="label">Last spell</span><span class="val" id="lastSpell">—</span></div>
    </div>

    <div class="card">
      <h2>Wand Control</h2>
      <div>
        <input type="color" id="colorPicker" value="#a78bfa">
        <button onclick="sendColor()">Set LED color</button>
        <button onclick="send({cmd:'led_off'})">LEDs off</button>
      </div>
      <div style="margin-top:8px">
        <button onclick="send({cmd:'flash', r:255, g:180, b:0, times:3})">✦ Sparks</button>
        <button onclick="send({cmd:'flash', r:0, g:120, b:255, times:2})">❄ Frost</button>
        <button onclick="send({cmd:'flash', r:255, g:40, b:0, times:2})">🔥 Ember</button>
      </div>
      <div style="margin-top:8px">
        <button onclick="sendOled()">Send OLED text</button>
        <input id="oledText" placeholder="OLED message…" style="background:#241e4a;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px;font-size:0.9rem;">
      </div>
    </div>

    <div class="card">
      <h2>Ask the Wand</h2>
      <div style="display:flex; gap:8px;">
        <input id="promptText" placeholder="Speak to Wazza…" onkeydown="if(event.key==='Enter')sendPrompt()" style="flex:1;background:#241e4a;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px;font-size:0.9rem;">
        <button onclick="sendPrompt()">Ask</button>
      </div>
      <p id="aiReply" style="margin-top:12px;color:var(--muted);font-size:0.9rem;font-style:italic;">The wand awaits…</p>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h2>Event Log</h2>
      <div id="log"></div>
    </div>
  </div>

<script>
const wsUrl = `ws://${location.hostname || 'localhost'}:8765`;
let ws;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => setText('wsStatus', 'backend connected');
  ws.onclose = () => {
    setText('wsStatus', 'backend disconnected — retrying…');
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handle(msg);
  };
}

function handle(msg) {
  if (msg.type === 'imu') {
    setText('accel', `${msg.ax.toFixed(1)} / ${msg.ay.toFixed(1)} / ${msg.az.toFixed(1)}`);
    setText('gyro', `${msg.gx.toFixed(1)} / ${msg.gy.toFixed(1)} / ${msg.gz.toFixed(1)}`);
  } else if (msg.type === 'gesture') {
    setText('lastGesture', msg.value);
    if (msg.spell) setText('lastSpell', msg.spell);
    log(`gesture: ${msg.value}${msg.spell ? ' → ' + msg.spell : ''}`, 'gesture');
  } else if (msg.type === 'button') {
    log(`button: ${msg.value}`, 'button');
  } else if (msg.type === 'ai') {
    document.getElementById('aiReply').textContent = msg.reply;
    setText('lastSpell', msg.source === 'gesture' ? document.getElementById('lastSpell').textContent : '—');
    log(`wazza: ${msg.reply}`, 'gesture');
  } else if (msg.type === 'status') {
    const online = msg.wand === 'online';
    document.getElementById('wandDot').classList.toggle('online', online);
    setText('wandStatus', online ? 'wand online' : 'wand offline');
    log(`wand ${msg.wand}`);
  }
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function sendColor() {
  const hex = document.getElementById('colorPicker').value;
  send({
    cmd: 'led',
    r: parseInt(hex.slice(1, 3), 16),
    g: parseInt(hex.slice(3, 5), 16),
    b: parseInt(hex.slice(5, 7), 16),
  });
}

function sendPrompt() {
  const text = document.getElementById('promptText').value.trim();
  if (text) {
    send({ type: 'prompt', text });
    document.getElementById('aiReply').textContent = '…';
    document.getElementById('promptText').value = '';
  }
}

function sendOled() {
  const text = document.getElementById('oledText').value.trim();
  if (text) send({ cmd: 'oled', line1: text });
}

function setText(id, text) { document.getElementById(id).textContent = text; }

function log(text, cls = '') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  el.insertAdjacentHTML('afterbegin',
    `<div><span class="time">${time}</span><span class="${cls}">${text}</span></div>`);
  while (el.children.length > 100) el.lastChild.remove();
}

connect();
</script>
</body>
</html>
